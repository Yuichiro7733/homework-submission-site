<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="授業中の教材をスマートフォンで撮影して送信するシンプルなサイト" />
    <title>授業キャプチャ | 教材送信</title>
    <style>
      .initial-loading{min-height:100vh;background:#f5f8f6;color:#17231e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.initial-loading header{display:flex;min-height:64px;padding:0 5%;align-items:center;border-bottom:1px solid #dce4df;background:#fff;font-weight:700}.initial-loading main{display:grid;min-height:calc(100vh - 64px);place-items:center;color:#6d7a74;font-size:14px}.initial-loading span{display:block;width:28px;height:28px;margin:0 auto 12px;border:3px solid #c8d6cf;border-top-color:#0f766e;border-radius:50%;animation:initial-spin .8s linear infinite}@keyframes initial-spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading">
        <header>授業キャプチャ</header>
        <main><div><span></span>読み込んでいます…</div></main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
